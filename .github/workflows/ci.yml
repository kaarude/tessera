name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck-build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tessera
          POSTGRES_PASSWORD: tessera
          POSTGRES_DB: tessera
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://tessera:tessera@localhost:5432/tessera?schema=public
      SESSION_SECRET: ci-test-secret-do-not-use-in-production-32bytes
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio12345
      S3_BUCKET: tessera
      S3_FORCE_PATH_STYLE: "true"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Migrate database
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # CI build doesn't have the live OAuth/etc. — only the env vars
          # above are required for `next build`.
          DATABASE_URL: postgresql://tessera:tessera@localhost:5432/tessera?schema=public
          SESSION_SECRET: ci-test-secret-do-not-use-in-production-32bytes
          S3_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_ACCESS_KEY_ID: minio
          S3_SECRET_ACCESS_KEY: minio12345
          S3_BUCKET: tessera
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npm test
